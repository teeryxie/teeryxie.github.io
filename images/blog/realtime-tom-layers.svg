<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1180 620" role="img" aria-labelledby="title desc"><title id="title">Mental-state inference layers</title><desc id="desc">Evidence is transformed into perspective, beliefs, common ground, and interaction actions with uncertainty gates.</desc><rect width="1180" height="620" fill="#f7f8fa"/><g font-family="Arial,sans-serif"><text x="64" y="60" fill="#172033" font-size="30" font-weight="700">From social signals to accountable action</text><text x="64" y="94" fill="#667085" font-size="16">Mental states are hypotheses, not permissions</text><g><rect x="98" y="470" width="984" height="62" rx="8" fill="#eaf4ff" stroke="#4386c8" stroke-width="2"/><text x="590" y="508" fill="#174f83" font-size="19" font-weight="700" text-anchor="middle">Evidence · words · prosody · gaze · gesture · scene · action history</text><rect x="172" y="380" width="836" height="62" rx="8" fill="#f3eef9" stroke="#9672b4" stroke-width="2"/><text x="590" y="418" fill="#654580" font-size="19" font-weight="700" text-anchor="middle">Perspective · what each participant could observe</text><rect x="246" y="290" width="688" height="62" rx="8" fill="#fff7e8" stroke="#e3a03f" stroke-width="2"/><text x="590" y="328" fill="#7a4810" font-size="19" font-weight="700" text-anchor="middle">Belief · goal · intention · affect · attention</text><rect x="320" y="200" width="540" height="62" rx="8" fill="#edf8f2" stroke="#56a37a" stroke-width="2"/><text x="590" y="238" fill="#235e43" font-size="19" font-weight="700" text-anchor="middle">Common ground · confirmed facts and commitments</text><rect x="394" y="110" width="392" height="62" rx="8" fill="#172033"/><text x="590" y="148" fill="#ffffff" font-size="19" font-weight="700" text-anchor="middle">Interaction policy and tools</text></g><g fill="#667085" font-size="14"><text x="90" y="574">uncertain</text><line x1="164" y1="570" x2="888" y2="570" stroke="#c3cad4" stroke-width="8"/><line x1="164" y1="570" x2="676" y2="570" stroke="#e3a03f" stroke-width="8"/><text x="910" y="574">confirmed</text></g></g></svg>
