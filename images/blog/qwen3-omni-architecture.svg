<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1180 620" role="img" aria-labelledby="title desc">
  <title id="title">Qwen3-Omni architecture</title>
  <desc id="desc">Text, image, audio, and video flow through encoders and TMRoPE into a Thinker, then text and context condition a Talker for streaming speech.</desc>
  <rect width="1180" height="620" fill="#f6f8fb"/>
  <text x="64" y="62" fill="#172033" font-family="Arial, sans-serif" font-size="30" font-weight="700">Qwen3-Omni: perception, reasoning, and speech</text>
  <text x="64" y="94" fill="#667085" font-family="Arial, sans-serif" font-size="16">A sparse Thinker-Talker system connected by shared multimodal context</text>
  <g font-family="Arial, sans-serif">
    <g fill="#ffffff" stroke="#cbd5e1" stroke-width="2">
      <rect x="64" y="148" width="172" height="72" rx="8"/><rect x="64" y="240" width="172" height="72" rx="8"/>
      <rect x="64" y="332" width="172" height="72" rx="8"/><rect x="64" y="424" width="172" height="72" rx="8"/>
    </g>
    <g fill="#27364d" font-size="19" font-weight="700" text-anchor="middle">
      <text x="150" y="192">Text tokens</text><text x="150" y="284">Image patches</text>
      <text x="150" y="376">Audio · AuT</text><text x="150" y="468">Video frames</text>
    </g>
    <path d="M236 184H310M236 276H310M236 368H310M236 460H310" stroke="#64748b" stroke-width="3"/>
    <rect x="310" y="176" width="196" height="312" rx="8" fill="#fff7e8" stroke="#e3a03f" stroke-width="2"/>
    <text x="408" y="226" fill="#7a4810" font-size="22" font-weight="700" text-anchor="middle">Unified input</text>
    <text x="408" y="270" fill="#684f2d" font-size="17" text-anchor="middle">Adapters</text>
    <text x="408" y="306" fill="#684f2d" font-size="17" text-anchor="middle">TMRoPE</text>
    <text x="408" y="342" fill="#684f2d" font-size="17" text-anchor="middle">80 ms time IDs</text>
    <line x1="344" y1="374" x2="472" y2="374" stroke="#e8c58c" stroke-width="2"/>
    <text x="408" y="412" fill="#684f2d" font-size="15" text-anchor="middle">Early joint</text>
    <text x="408" y="437" fill="#684f2d" font-size="15" text-anchor="middle">omni pretraining</text>
    <path d="M506 332H570" stroke="#64748b" stroke-width="3"/>
    <rect x="570" y="176" width="222" height="312" rx="8" fill="#eaf4ff" stroke="#4386c8" stroke-width="2"/>
    <text x="681" y="226" fill="#174f83" font-size="26" font-weight="700" text-anchor="middle">Thinker</text>
    <text x="681" y="263" fill="#315b80" font-size="17" text-anchor="middle">MoE Transformer</text>
    <text x="681" y="294" fill="#315b80" font-size="17" text-anchor="middle">30B total · 3B active</text>
    <line x1="610" y1="322" x2="752" y2="322" stroke="#9dc3e6" stroke-width="2"/>
    <text x="681" y="360" fill="#315b80" font-size="16" text-anchor="middle">Multimodal reasoning</text>
    <text x="681" y="389" fill="#315b80" font-size="16" text-anchor="middle">Text generation</text>
    <text x="681" y="418" fill="#315b80" font-size="16" text-anchor="middle">GSPO post-training</text>
    <path d="M792 258H862" stroke="#64748b" stroke-width="3"/>
    <text x="827" y="244" fill="#667085" font-size="14" text-anchor="middle">text</text>
    <rect x="862" y="148" width="254" height="108" rx="8" fill="#ffffff" stroke="#75a68e" stroke-width="2"/>
    <text x="989" y="194" fill="#285f49" font-size="22" font-weight="700" text-anchor="middle">Text response</text>
    <text x="989" y="222" fill="#47725f" font-size="15" text-anchor="middle">Instruct / Thinking</text>
    <path d="M792 386H862" stroke="#64748b" stroke-width="3"/>
    <text x="827" y="372" fill="#667085" font-size="14" text-anchor="middle">context</text>
    <rect x="862" y="292" width="254" height="196" rx="8" fill="#edf8f2" stroke="#56a37a" stroke-width="2"/>
    <text x="989" y="340" fill="#235e43" font-size="26" font-weight="700" text-anchor="middle">Talker</text>
    <text x="989" y="374" fill="#3f715b" font-size="16" text-anchor="middle">MoE · 3B / 0.3B active</text>
    <text x="989" y="408" fill="#3f715b" font-size="16" text-anchor="middle">RVQ + MTP + Code2Wav</text>
    <text x="989" y="445" fill="#235e43" font-size="18" font-weight="700" text-anchor="middle">Streaming speech</text>
    <rect x="64" y="548" width="1052" height="40" rx="8" fill="#172033"/>
    <text x="590" y="574" fill="#ffffff" font-size="16" text-anchor="middle">Design target: modality parity + cross-modal reasoning + real-time interaction</text>
  </g>
</svg>
