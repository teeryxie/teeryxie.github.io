<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1180 620" role="img" aria-labelledby="title desc">
  <title id="title">Omni model architecture shifts</title>
  <desc id="desc">A diagram comparing pipeline multimodality, unified token modeling, Thinker-Talker, and streaming agent stacks.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fbfcff"/>
      <stop offset="1" stop-color="#f7fbf4"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="10" stdDeviation="10" flood-color="#1f252d" flood-opacity=".10"/>
    </filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 Z" fill="#738aa4"/>
    </marker>
  </defs>
  <rect width="1180" height="620" fill="url(#bg)"/>
  <text x="60" y="62" font-family="Inter, Arial, sans-serif" font-size="30" font-weight="800" fill="#172033">Architecture Shifts Behind Omni Models</text>
  <text x="60" y="96" font-family="Inter, Arial, sans-serif" font-size="16" fill="#5d6876">The key transition is from independent modality pipelines to time-aligned, streaming, and jointly optimized systems.</text>
  <g filter="url(#shadow)" font-family="Inter, Arial, sans-serif">
    <rect x="70" y="155" width="240" height="300" rx="14" fill="#fff" stroke="#dce4ee"/>
    <text x="102" y="198" font-size="21" font-weight="800" fill="#172033">Pipeline Era</text>
    <rect x="108" y="238" width="158" height="34" rx="17" fill="#ecf4ff" stroke="#c8d9ee"/>
    <text x="144" y="260" font-size="13" font-weight="800" fill="#215fa8">ASR</text>
    <rect x="108" y="292" width="158" height="34" rx="17" fill="#edf8f2" stroke="#bdddcf"/>
    <text x="140" y="314" font-size="13" font-weight="800" fill="#21664e">LLM / VLM</text>
    <rect x="108" y="346" width="158" height="34" rx="17" fill="#fff1ed" stroke="#f2c7bd"/>
    <text x="146" y="368" font-size="13" font-weight="800" fill="#9a332c">TTS</text>
    <text x="102" y="420" font-size="14" fill="#5d6876">simple but loses timing, emotion and turn dynamics</text>
    <rect x="354" y="155" width="240" height="300" rx="14" fill="#fff" stroke="#dce4ee"/>
    <text x="386" y="198" font-size="21" font-weight="800" fill="#172033">Unified Tokens</text>
    <text x="386" y="234" font-size="14" fill="#5d6876">AnyGPT-style discrete sequence modeling</text>
    <circle cx="412" cy="302" r="18" fill="#ecf4ff" stroke="#c8d9ee"/>
    <circle cx="464" cy="302" r="18" fill="#edf8f2" stroke="#bdddcf"/>
    <circle cx="516" cy="302" r="18" fill="#fff1ed" stroke="#f2c7bd"/>
    <circle cx="464" cy="354" r="18" fill="#f4efff" stroke="#d5c9f2"/>
    <text x="386" y="420" font-size="14" fill="#5d6876">modalities become language-like token streams</text>
    <rect x="638" y="155" width="240" height="300" rx="14" fill="#fff" stroke="#dce4ee"/>
    <text x="670" y="198" font-size="21" font-weight="800" fill="#172033">Thinker-Talker</text>
    <text x="670" y="234" font-size="14" fill="#5d6876">Qwen2.5-Omni separates reasoning and speech</text>
    <rect x="688" y="282" width="140" height="44" rx="10" fill="#ecf4ff" stroke="#c8d9ee"/>
    <text x="730" y="310" font-size="14" font-weight="800" fill="#215fa8">Thinker</text>
    <rect x="688" y="352" width="140" height="44" rx="10" fill="#fff1ed" stroke="#f2c7bd"/>
    <text x="735" y="380" font-size="14" font-weight="800" fill="#9a332c">Talker</text>
    <rect x="922" y="155" width="190" height="300" rx="14" fill="#fff" stroke="#dce4ee"/>
    <text x="952" y="198" font-size="21" font-weight="800" fill="#172033">Agentic Omni</text>
    <text x="952" y="234" font-size="14" fill="#5d6876">live APIs, memory, tools, RL</text>
    <rect x="952" y="282" width="120" height="34" rx="17" fill="#f0fbf7" stroke="#bdddcf"/>
    <text x="982" y="304" font-size="13" font-weight="800" fill="#21664e">stream</text>
    <rect x="952" y="334" width="120" height="34" rx="17" fill="#fff8ed" stroke="#efcf9c"/>
    <text x="986" y="356" font-size="13" font-weight="800" fill="#8a5a16">tool</text>
    <rect x="952" y="386" width="120" height="34" rx="17" fill="#f4efff" stroke="#d5c9f2"/>
    <text x="984" y="408" font-size="13" font-weight="800" fill="#5d4695">memory</text>
  </g>
  <path d="M318 305 C332 305 336 305 346 305" stroke="#738aa4" stroke-width="4" fill="none" marker-end="url(#arrow)"/>
  <path d="M602 305 C616 305 620 305 630 305" stroke="#738aa4" stroke-width="4" fill="none" marker-end="url(#arrow)"/>
  <path d="M886 305 C900 305 904 305 914 305" stroke="#738aa4" stroke-width="4" fill="none" marker-end="url(#arrow)"/>
</svg>
