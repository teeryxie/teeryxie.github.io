<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1180 620" role="img" aria-labelledby="title desc">
  <title id="title">Realtime model latency comparison</title><desc id="desc">Published latency numbers grouped by measurement boundary rather than ranked as directly comparable.</desc>
  <rect width="1180" height="620" fill="#f7f8fa"/><g font-family="Arial, sans-serif">
  <text x="64" y="60" fill="#172033" font-size="30" font-weight="700">Latency numbers need measurement boundaries</text><text x="64" y="94" fill="#667085" font-size="16">Positions show reported values; lanes show why they are not an apples-to-apples ranking</text>
  <line x1="252" y1="150" x2="1090" y2="150" stroke="#b3bdc9" stroke-width="2"/><g fill="#667085" font-size="13" text-anchor="middle"><text x="252" y="136">0 ms</text><text x="420" y="136">250</text><text x="588" y="136">500</text><text x="756" y="136">750</text><text x="924" y="136">1000</text><text x="1090" y="136">1250</text></g>
  <g stroke="#d7dde5" stroke-width="1"><line x1="252" y1="150" x2="252" y2="536"/><line x1="420" y1="150" x2="420" y2="536"/><line x1="588" y1="150" x2="588" y2="536"/><line x1="756" y1="150" x2="756" y2="536"/><line x1="924" y1="150" x2="924" y2="536"/><line x1="1090" y1="150" x2="1090" y2="536"/></g>
  <g font-size="14"><text x="64" y="230" fill="#315b80" font-weight="700">Theoretical / controlled</text><text x="64" y="250" fill="#315b80" font-weight="700">first audio</text><text x="64" y="361" fill="#684f2d" font-weight="700">Broader model or demo chain</text><text x="64" y="478" fill="#235e43" font-weight="700">Partial / serving metrics</text></g>
  <g>
    <rect x="252" y="166" width="838" height="158" rx="8" fill="#e7f1fa"/>
    <circle cx="360" cy="188" r="7" fill="#4386c8"/><text x="375" y="193" fill="#174f83" font-size="13">Moshi · 160 theoretical</text>
    <line x1="408" y1="219" x2="467" y2="219" stroke="#4386c8" stroke-width="5"/><circle cx="408" cy="219" r="6" fill="#174f83"/><circle cx="467" cy="219" r="6" fill="#174f83"/><text x="482" y="224" fill="#174f83" font-size="13">GPT-4o · 232 min / 320 avg</text>
    <circle cx="411" cy="250" r="7" fill="#4386c8"/><text x="426" y="255" fill="#174f83" font-size="13">LLaMA-Omni · 236</text>
    <circle cx="409" cy="281" r="7" fill="#4386c8"/><text x="424" y="286" fill="#174f83" font-size="13">Qwen3 · 234</text><circle cx="410" cy="306" r="7" fill="#4386c8"/><line x1="417" y1="306" x2="550" y2="306" stroke="#4386c8" stroke-width="2"/><text x="567" y="311" fill="#174f83" font-size="13">Qwen3.5 Flash · 235</text>
    <line x1="252" y1="385" x2="1090" y2="385" stroke="#f5e3c6" stroke-width="42"/><circle cx="722" cy="385" r="8" fill="#e3a03f"/><text x="722" y="374" fill="#7a4810" font-size="13" text-anchor="middle">VITA model 700</text><circle cx="753" cy="385" r="8" fill="#e3a03f"/><text x="753" y="409" fill="#7a4810" font-size="13" text-anchor="middle">Freeze model chain 745</text><circle cx="1058" cy="385" r="8" fill="#c97d22"/><text x="1018" y="374" fill="#7a4810" font-size="13" text-anchor="middle">Freeze deployed ≈1200</text>
    <line x1="252" y1="502" x2="1090" y2="502" stroke="#d9eee3" stroke-width="42"/><circle cx="306" cy="502" r="8" fill="#56a37a"/><text x="306" y="491" fill="#235e43" font-size="13" text-anchor="middle">Relay 81*</text><circle cx="500" cy="502" r="8" fill="#56a37a"/><text x="500" y="526" fill="#235e43" font-size="13" text-anchor="middle">ROMA 370/unit</text><circle cx="816" cy="502" r="8" fill="#3a9168"/><text x="816" y="491" fill="#235e43" font-size="13" text-anchor="middle">LiveServe P90 840</text>
  </g>
  <rect x="64" y="554" width="1072" height="42" rx="8" fill="#172033"/><text x="600" y="571" fill="#ffffff" font-size="13" text-anchor="middle">* Relay starts after turn decision and excludes endpoint, network, and TTS. LiveServe includes concurrent serving pressure.</text><text x="600" y="588" fill="#cbd5e1" font-size="13" text-anchor="middle">Unit: milliseconds. Values are paper-specific and should not be used as a universal speed ranking.</text>
  </g></svg>
