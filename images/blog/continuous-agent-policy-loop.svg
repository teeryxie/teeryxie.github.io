<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1180 620" role="img" aria-labelledby="title desc"><title id="title">Continuous-time Speech-Language-Action policy</title><desc id="desc">A shared causal state receives streaming observations and emits speech, control, action, and memory operations on different rates.</desc><rect width="1180" height="620" fill="#f6f8fb"/><g font-family="Arial,sans-serif"><text x="64" y="60" fill="#172033" font-size="30" font-weight="700">Interactive omni is a continuous-time policy</text><text x="64" y="94" fill="#667085" font-size="16">Listen, update, act, speak, and revise on one causal clock</text><g><rect x="64" y="150" width="238" height="282" rx="8" fill="#eaf4ff" stroke="#4386c8" stroke-width="2"/><text x="183" y="190" fill="#174f83" font-size="20" font-weight="700" text-anchor="middle">Streaming observations</text><text x="183" y="235" fill="#315b80" font-size="15" text-anchor="middle">user audio + video</text><text x="183" y="270" fill="#315b80" font-size="15" text-anchor="middle">tool result events</text><text x="183" y="305" fill="#315b80" font-size="15" text-anchor="middle">memory reads</text><text x="183" y="340" fill="#315b80" font-size="15" text-anchor="middle">playback position</text><text x="183" y="375" fill="#315b80" font-size="15" text-anchor="middle">previous actions</text><path d="M302 291H372" stroke="#8794a5" stroke-width="4"/><path d="M360 280l14 11-14 11" fill="none" stroke="#8794a5" stroke-width="4"/><rect x="374" y="150" width="356" height="282" rx="8" fill="#172033"/><text x="552" y="193" fill="#ffffff" font-size="21" font-weight="700" text-anchor="middle">Causal streaming state h<tspan baseline-shift="sub" font-size="13">t</tspan></text><text x="552" y="246" fill="#d7dee8" font-size="15" text-anchor="middle">intent distribution</text><text x="552" y="281" fill="#d7dee8" font-size="15" text-anchor="middle">belief + uncertainty</text><text x="552" y="316" fill="#d7dee8" font-size="15" text-anchor="middle">plan + commitments</text><text x="552" y="351" fill="#d7dee8" font-size="15" text-anchor="middle">dialogue + tool state</text><text x="552" y="386" fill="#d7dee8" font-size="15" text-anchor="middle">common ground</text></g><g><path d="M730 291H796" stroke="#8794a5" stroke-width="4"/><path d="M784 280l14 11-14 11" fill="none" stroke="#8794a5" stroke-width="4"/><rect x="798" y="132" width="318" height="84" rx="8" fill="#edf8f2" stroke="#56a37a" stroke-width="2"/><text x="957" y="167" fill="#235e43" font-size="18" font-weight="700" text-anchor="middle">Speech head</text><text x="957" y="194" fill="#3f715b" font-size="14" text-anchor="middle">audio · silence · prosody</text><rect x="798" y="228" width="318" height="84" rx="8" fill="#fff7e8" stroke="#e3a03f" stroke-width="2"/><text x="957" y="263" fill="#7a4810" font-size="18" font-weight="700" text-anchor="middle">Control head</text><text x="957" y="290" fill="#684f2d" font-size="14" text-anchor="middle">listen · start · yield · abort</text><rect x="798" y="324" width="318" height="84" rx="8" fill="#f3eef9" stroke="#9672b4" stroke-width="2"/><text x="957" y="359" fill="#654580" font-size="18" font-weight="700" text-anchor="middle">Action channel</text><text x="957" y="386" fill="#6f5a80" font-size="14" text-anchor="middle">call · cancel · prepare · commit</text><rect x="798" y="420" width="318" height="84" rx="8" fill="#ffffff" stroke="#9aa6b5" stroke-width="2"/><text x="957" y="455" fill="#27364d" font-size="18" font-weight="700" text-anchor="middle">Memory policy</text><text x="957" y="482" fill="#526176" font-size="14" text-anchor="middle">read · write · correct · forget</text></g><rect x="64" y="548" width="1052" height="44" rx="8" fill="#172033"/><text x="590" y="576" fill="#ffffff" font-size="15" text-anchor="middle">Shared state, multi-rate channels, asynchronous execution, continuous revision.</text></g></svg>
