<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1180 620" role="img" aria-labelledby="title desc">
  <title id="title">Common realtime omni techniques</title><desc id="desc">Representation, execution, policy, and serving techniques that reduce perceived latency.</desc>
  <rect width="1180" height="620" fill="#f6f8fb"/><g font-family="Arial, sans-serif">
  <text x="64" y="60" fill="#172033" font-size="30" font-weight="700">Why realtime models are fast</text><text x="64" y="94" fill="#667085" font-size="16">Latency is removed at four layers, not by one isolated architecture trick</text>
  <g>
    <rect x="64" y="142" width="244" height="376" rx="8" fill="#eaf4ff" stroke="#4386c8" stroke-width="2"/><text x="186" y="184" fill="#174f83" font-size="21" font-weight="700" text-anchor="middle">Representation</text><text x="94" y="230" fill="#315b80" font-size="16">Low-rate audio tokens</text><text x="94" y="270" fill="#315b80" font-size="16">Semantic / acoustic split</text><text x="94" y="310" fill="#315b80" font-size="16">Parallel codebooks</text><text x="94" y="350" fill="#315b80" font-size="16">Time-aligned streams</text><rect x="94" y="402" width="184" height="72" rx="7" fill="#ffffff"/><text x="186" y="432" fill="#174f83" font-size="15" font-weight="700" text-anchor="middle">Fewer expensive steps</text><text x="186" y="456" fill="#5c7188" font-size="13" text-anchor="middle">6.25–12.5 Hz is typical</text>
    <rect x="332" y="142" width="244" height="376" rx="8" fill="#fff7e8" stroke="#e3a03f" stroke-width="2"/><text x="454" y="184" fill="#7a4810" font-size="21" font-weight="700" text-anchor="middle">Execution graph</text><text x="362" y="230" fill="#684f2d" font-size="16">Chunked encoder</text><text x="362" y="270" fill="#684f2d" font-size="16">Prefill while user speaks</text><text x="362" y="310" fill="#684f2d" font-size="16">Text-speech interleave</text><text x="362" y="350" fill="#684f2d" font-size="16">Causal first-frame vocoder</text><rect x="362" y="402" width="184" height="72" rx="7" fill="#ffffff"/><text x="454" y="432" fill="#7a4810" font-size="15" font-weight="700" text-anchor="middle">Overlap the pipeline</text><text x="454" y="456" fill="#7e6545" font-size="13" text-anchor="middle">compute before turn end</text>
    <rect x="600" y="142" width="244" height="376" rx="8" fill="#f3eef9" stroke="#9672b4" stroke-width="2"/><text x="722" y="184" fill="#654580" font-size="21" font-weight="700" text-anchor="middle">Interaction policy</text><text x="630" y="230" fill="#6f5a80" font-size="16">Dual user / agent streams</text><text x="630" y="270" fill="#6f5a80" font-size="16">Speak / hold / stop state</text><text x="630" y="310" fill="#6f5a80" font-size="16">Fast and slow paths</text><text x="630" y="350" fill="#6f5a80" font-size="16">Barge-in cancellation</text><rect x="630" y="402" width="184" height="72" rx="7" fill="#ffffff"/><text x="722" y="432" fill="#654580" font-size="15" font-weight="700" text-anchor="middle">Decide before decoding</text><text x="722" y="456" fill="#83718f" font-size="13" text-anchor="middle">when and how to act</text>
    <rect x="868" y="142" width="248" height="376" rx="8" fill="#edf8f2" stroke="#56a37a" stroke-width="2"/><text x="992" y="184" fill="#235e43" font-size="21" font-weight="700" text-anchor="middle">Serving</text><text x="898" y="230" fill="#3f715b" font-size="16">First-audio priority</text><text x="898" y="270" fill="#3f715b" font-size="16">Playback-aware scheduling</text><text x="898" y="310" fill="#3f715b" font-size="16">KV preload during speech</text><text x="898" y="350" fill="#3f715b" font-size="16">Discard speculative work</text><rect x="898" y="402" width="188" height="72" rx="7" fill="#ffffff"/><text x="992" y="432" fill="#235e43" font-size="15" font-weight="700" text-anchor="middle">Optimize heard audio</text><text x="992" y="456" fill="#587363" font-size="13" text-anchor="middle">not raw tokens / second</text>
  </g>
  <rect x="64" y="554" width="1052" height="40" rx="8" fill="#172033"/><text x="590" y="580" fill="#ffffff" font-size="16" text-anchor="middle">Compress → overlap → choose timing → schedule around playback</text>
  </g></svg>
