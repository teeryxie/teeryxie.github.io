<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1180 620" role="img" aria-labelledby="title desc">
  <title id="title">Realtime omni interaction timeline</title><desc id="desc">A timeline from modular voice agents through duplex speech models to agentic omni systems.</desc>
  <rect width="1180" height="620" fill="#f6f8fb"/><g font-family="Arial, sans-serif">
  <text x="64" y="60" fill="#172033" font-size="30" font-weight="700">From voice pipelines to agentic omni systems</text><text x="64" y="94" fill="#667085" font-size="16">The research target moved from fast turn-taking to continuous perception, policy, and action</text>
  <line x1="92" y1="320" x2="1088" y2="320" stroke="#8592a3" stroke-width="4"/>
  <g>
    <circle cx="122" cy="320" r="12" fill="#6d7f95"/><rect x="64" y="148" width="192" height="126" rx="8" fill="#ffffff" stroke="#9aa6b5" stroke-width="2"/><text x="160" y="181" fill="#27364d" font-size="18" font-weight="700" text-anchor="middle">1990s–2018</text><text x="160" y="213" fill="#5b6879" font-size="15" text-anchor="middle">Verbmobil · Siri</text><text x="160" y="238" fill="#5b6879" font-size="15" text-anchor="middle">Alexa · Duplex</text><text x="160" y="262" fill="#7a8491" font-size="13" text-anchor="middle">modular task agents</text>
    <circle cx="340" cy="320" r="12" fill="#9672b4"/><rect x="270" y="370" width="200" height="130" rx="8" fill="#f3eef9" stroke="#9672b4" stroke-width="2"/><text x="370" y="403" fill="#654580" font-size="18" font-weight="700" text-anchor="middle">2022–2023</text><text x="370" y="435" fill="#6f5a80" font-size="15" text-anchor="middle">dGSLM · SpeechGPT</text><text x="370" y="460" fill="#6f5a80" font-size="15" text-anchor="middle">AudioPaLM</text><text x="370" y="484" fill="#83718f" font-size="13" text-anchor="middle">generative speech dialogue</text>
    <circle cx="566" cy="320" r="12" fill="#4386c8"/><rect x="486" y="142" width="220" height="136" rx="8" fill="#eaf4ff" stroke="#4386c8" stroke-width="2"/><text x="596" y="177" fill="#174f83" font-size="18" font-weight="700" text-anchor="middle">2024</text><text x="596" y="208" fill="#315b80" font-size="15" text-anchor="middle">GPT-4o · Moshi</text><text x="596" y="233" fill="#315b80" font-size="15" text-anchor="middle">LLaMA-Omni · Freeze</text><text x="596" y="258" fill="#5c7188" font-size="13" text-anchor="middle">200–700 ms + full duplex</text>
    <circle cx="790" cy="320" r="12" fill="#e3a03f"/><rect x="714" y="370" width="216" height="138" rx="8" fill="#fff7e8" stroke="#e3a03f" stroke-width="2"/><text x="822" y="403" fill="#7a4810" font-size="18" font-weight="700" text-anchor="middle">2025</text><text x="822" y="434" fill="#684f2d" font-size="15" text-anchor="middle">Qwen2.5 · SALM</text><text x="822" y="459" fill="#684f2d" font-size="15" text-anchor="middle">Nova Sonic · Gemini Live</text><text x="822" y="484" fill="#7e6545" font-size="13" text-anchor="middle">omni + interruption + tools</text>
    <circle cx="1030" cy="320" r="12" fill="#56a37a"/><rect x="930" y="138" width="206" height="142" rx="8" fill="#edf8f2" stroke="#56a37a" stroke-width="2"/><text x="1033" y="173" fill="#235e43" font-size="18" font-weight="700" text-anchor="middle">2026</text><text x="1033" y="204" fill="#3f715b" font-size="15" text-anchor="middle">Qwen3.5 · ROMA</text><text x="1033" y="229" fill="#3f715b" font-size="15" text-anchor="middle">RelayS2S · LiveServe</text><text x="1033" y="254" fill="#587363" font-size="13" text-anchor="middle">timing policy + serving + RL</text>
  </g>
  <rect x="64" y="550" width="1072" height="40" rx="8" fill="#172033"/><text x="600" y="576" fill="#ffffff" font-size="16" text-anchor="middle">Pipeline agent → generative dialogue → native duplex → omni interaction → continuous agentic policy</text>
  </g></svg>
