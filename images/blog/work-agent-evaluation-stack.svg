<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1180 620" role="img" aria-labelledby="title desc"><title id="title">Work agent evaluation stack</title><desc id="desc">Seven evaluation layers from latency to governance for agents that interact with people at work.</desc><rect width="1180" height="620" fill="#f7f8fa"/><g font-family="Arial,sans-serif"><text x="64" y="60" fill="#172033" font-size="30" font-weight="700">Replacement evidence is a seven-layer stack</text><text x="64" y="94" fill="#667085" font-size="16">A fluent transcript or one successful run is only the bottom of the evidence chain</text><g font-size="16" font-weight="700" text-anchor="middle"><rect x="190" y="128" width="800" height="52" rx="7" fill="#edf8f2" stroke="#56a37a" stroke-width="2"/><text x="590" y="160" fill="#235e43">7 · Governance · appeal · audit · responsibility · safe handoff</text><rect x="190" y="190" width="800" height="52" rx="7" fill="#e5f4eb" stroke="#56a37a" stroke-width="2"/><text x="590" y="222" fill="#235e43">6 · Fairness · accessibility · privacy · subgroup outcomes</text><rect x="190" y="252" width="800" height="52" rx="7" fill="#f3eef9" stroke="#9672b4" stroke-width="2"/><text x="590" y="284" fill="#654580">5 · Human outcomes · satisfaction · trust · completion · utility</text><rect x="190" y="314" width="800" height="52" rx="7" fill="#e7dff0" stroke="#9672b4" stroke-width="2"/><text x="590" y="346" fill="#654580">4 · Reliability · pass^k · tail failure · distribution shift</text><rect x="190" y="376" width="800" height="52" rx="7" fill="#fff7e8" stroke="#e3a03f" stroke-width="2"/><text x="590" y="408" fill="#7a4810">3 · Workflow result · database state · tools · policy compliance</text><rect x="190" y="438" width="800" height="52" rx="7" fill="#eaf4ff" stroke="#4386c8" stroke-width="2"/><text x="590" y="470" fill="#174f83">2 · Information quality · coverage · probing · correction</text><rect x="190" y="500" width="800" height="52" rx="7" fill="#ffffff" stroke="#9aa6b5" stroke-width="2"/><text x="590" y="532" fill="#27364d">1 · Realtime UX · latency · interruption · speech quality</text></g><text x="590" y="592" fill="#667085" font-size="14" text-anchor="middle">Do not infer layer 7 readiness from a layer 1 demo.</text></g></svg>
