<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1180 620" role="img" aria-labelledby="title desc"><title id="title">Work agent automation ladder</title><desc id="desc">Four levels from assisting a human to replacing an occupation, with increasing requirements for reliability and accountability.</desc><rect width="1180" height="620" fill="#f6f8fb"/><g font-family="Arial,sans-serif"><text x="64" y="60" fill="#172033" font-size="30" font-weight="700">Automation is a ladder, not a binary claim</text><text x="64" y="94" fill="#667085" font-size="16">Deployment volume proves scale; replacement requires coverage, reliability, and accountable outcomes</text><g><rect x="88" y="410" width="230" height="100" rx="8" fill="#eaf4ff" stroke="#4386c8" stroke-width="2"/><text x="203" y="445" fill="#174f83" font-size="19" font-weight="700" text-anchor="middle">L1 · Assist</text><text x="203" y="475" fill="#315b80" font-size="14" text-anchor="middle">transcribe · suggest · summarize</text><rect x="340" y="322" width="230" height="188" rx="8" fill="#f3eef9" stroke="#9672b4" stroke-width="2"/><text x="455" y="359" fill="#654580" font-size="19" font-weight="700" text-anchor="middle">L2 · Lead a session</text><text x="455" y="391" fill="#6f5a80" font-size="14" text-anchor="middle">conduct an interview</text><text x="455" y="417" fill="#6f5a80" font-size="14" text-anchor="middle">ask follow-ups</text><text x="455" y="443" fill="#6f5a80" font-size="14" text-anchor="middle">human reviews afterward</text><rect x="592" y="234" width="230" height="276" rx="8" fill="#fff7e8" stroke="#e3a03f" stroke-width="2"/><text x="707" y="271" fill="#7a4810" font-size="19" font-weight="700" text-anchor="middle">L3 · Own a workflow</text><text x="707" y="303" fill="#684f2d" font-size="14" text-anchor="middle">tools · policies · database</text><text x="707" y="329" fill="#684f2d" font-size="14" text-anchor="middle">interruptions · exceptions</text><text x="707" y="355" fill="#684f2d" font-size="14" text-anchor="middle">escalation · rollback</text><rect x="844" y="146" width="250" height="364" rx="8" fill="#edf8f2" stroke="#56a37a" stroke-width="2"/><text x="969" y="183" fill="#235e43" font-size="19" font-weight="700" text-anchor="middle">L4 · Occupational proxy</text><text x="969" y="217" fill="#3f715b" font-size="14" text-anchor="middle">long-tail task coverage</text><text x="969" y="243" fill="#3f715b" font-size="14" text-anchor="middle">cross-system coordination</text><text x="969" y="269" fill="#3f715b" font-size="14" text-anchor="middle">fairness · liability</text><text x="969" y="295" fill="#3f715b" font-size="14" text-anchor="middle">long-term outcomes</text><text x="969" y="350" fill="#8b3f34" font-size="14" font-weight="700" text-anchor="middle">Not established by current</text><text x="969" y="376" fill="#8b3f34" font-size="14" font-weight="700" text-anchor="middle">public general-agent evidence</text></g><line x1="88" y1="548" x2="1094" y2="548" stroke="#172033" stroke-width="4"/><text x="88" y="582" fill="#667085" font-size="14">human owns decisions</text><text x="928" y="582" fill="#667085" font-size="14">agent owns outcomes</text></g></svg>
