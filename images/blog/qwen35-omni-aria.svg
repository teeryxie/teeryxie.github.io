<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1180 620" role="img" aria-labelledby="title desc">
  <title id="title">ARIA adaptive speech text alignment</title><desc id="desc">Fixed interleaving drifts across languages while ARIA maintains an item-specific ratio in a single stream.</desc>
  <rect width="1180" height="620" fill="#f6f8fb"/><g font-family="Arial, sans-serif">
  <text x="64" y="62" fill="#172033" font-size="30" font-weight="700">ARIA: alignment by adaptive rate</text><text x="64" y="96" fill="#667085" font-size="16">Text and speech tokenizers do not advance at the same speed across languages</text>
  <rect x="64" y="150" width="480" height="354" rx="8" fill="#fff4f1" stroke="#d87968" stroke-width="2"/><text x="304" y="197" fill="#8b3f34" font-size="22" font-weight="700" text-anchor="middle">Fixed-rate or dual-track</text>
  <text x="104" y="245" fill="#6f514d" font-size="15">Text</text><g fill="#4f86bd"><rect x="166" y="224" width="48" height="30" rx="4"/><rect x="224" y="224" width="78" height="30" rx="4"/><rect x="312" y="224" width="42" height="30" rx="4"/><rect x="364" y="224" width="112" height="30" rx="4"/></g>
  <text x="104" y="301" fill="#6f514d" font-size="15">Speech</text><g fill="#db9b42"><rect x="166" y="280" width="52" height="30" rx="4"/><rect x="228" y="280" width="52" height="30" rx="4"/><rect x="290" y="280" width="52" height="30" rx="4"/><rect x="352" y="280" width="52" height="30" rx="4"/><rect x="414" y="280" width="52" height="30" rx="4"/></g>
  <path d="M190 260L190 276M263 260L254 276M333 260L316 276M420 260L440 276" stroke="#c65747" stroke-width="2" stroke-dasharray="5 4"/>
  <text x="304" y="357" fill="#8b3f34" font-size="18" font-weight="700" text-anchor="middle">Drift accumulates</text><text x="304" y="388" fill="#765854" font-size="15" text-anchor="middle">skips · repeats · number errors</text><text x="304" y="416" fill="#765854" font-size="15" text-anchor="middle">language-dependent pacing</text>
  <rect x="596" y="150" width="520" height="354" rx="8" fill="#edf8f2" stroke="#56a37a" stroke-width="2"/><text x="856" y="197" fill="#235e43" font-size="22" font-weight="700" text-anchor="middle">ARIA single interleaved stream</text>
  <text x="636" y="245" fill="#587363" font-size="15">Output</text><g><rect x="704" y="220" width="54" height="34" rx="4" fill="#4f86bd"/><rect x="766" y="220" width="42" height="34" rx="4" fill="#db9b42"/><rect x="816" y="220" width="42" height="34" rx="4" fill="#db9b42"/><rect x="866" y="220" width="76" height="34" rx="4" fill="#4f86bd"/><rect x="950" y="220" width="42" height="34" rx="4" fill="#db9b42"/><rect x="1000" y="220" width="42" height="34" rx="4" fill="#db9b42"/></g>
  <g font-size="13" fill="#ffffff" text-anchor="middle"><text x="731" y="243">text</text><text x="787" y="243">s</text><text x="837" y="243">s</text><text x="904" y="243">text</text><text x="971" y="243">s</text><text x="1021" y="243">s</text></g>
  <rect x="668" y="298" width="376" height="72" rx="7" fill="#ffffff"/><text x="856" y="326" fill="#235e43" font-size="17" font-weight="700" text-anchor="middle">Prefix constraint</text><text x="856" y="352" fill="#4c6d5d" font-size="15" text-anchor="middle">speech tokens / text tokens ≤ item-level ratio</text>
  <text x="856" y="410" fill="#235e43" font-size="18" font-weight="700" text-anchor="middle">Monotonic, but not fixed</text><text x="856" y="439" fill="#587363" font-size="15" text-anchor="middle">adapts to language, numbers, and token efficiency</text>
  <rect x="64" y="544" width="1052" height="42" rx="8" fill="#172033"/><rect x="306" y="554" width="18" height="18" rx="3" fill="#4f86bd"/><text x="337" y="569" fill="#ffffff" font-size="15">text token</text><rect x="475" y="554" width="18" height="18" rx="3" fill="#db9b42"/><text x="506" y="569" fill="#ffffff" font-size="15">speech token</text><text x="730" y="569" fill="#d8e0ea" font-size="15">same RVQ + MTP + causal Code2Wav backend</text>
  </g></svg>
