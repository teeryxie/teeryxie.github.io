<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1180 620" role="img" aria-labelledby="title desc"><title id="title">Realtime work agent architecture</title><desc id="desc">A deployable work agent combines streaming interaction, state, policy, transactional tools, evidence, and human escalation.</desc><rect width="1180" height="620" fill="#f6f8fb"/><g font-family="Arial,sans-serif"><text x="64" y="60" fill="#172033" font-size="30" font-weight="700">A workforce agent is a governed system</text><text x="64" y="94" fill="#667085" font-size="16">The voice model is the front door, not the whole worker</text><g><rect x="64" y="150" width="220" height="122" rx="8" fill="#eaf4ff" stroke="#4386c8" stroke-width="2"/><text x="174" y="188" fill="#174f83" font-size="18" font-weight="700" text-anchor="middle">Streaming interaction</text><text x="174" y="220" fill="#315b80" font-size="14" text-anchor="middle">speech · video · screen</text><text x="174" y="246" fill="#315b80" font-size="14" text-anchor="middle">barge-in · addressee</text><rect x="334" y="150" width="220" height="122" rx="8" fill="#f3eef9" stroke="#9672b4" stroke-width="2"/><text x="444" y="188" fill="#654580" font-size="18" font-weight="700" text-anchor="middle">Conversation state</text><text x="444" y="220" fill="#6f5a80" font-size="14" text-anchor="middle">facts · conflicts · stage</text><text x="444" y="246" fill="#6f5a80" font-size="14" text-anchor="middle">commitments · uncertainty</text><rect x="604" y="150" width="220" height="122" rx="8" fill="#fff7e8" stroke="#e3a03f" stroke-width="2"/><text x="714" y="188" fill="#7a4810" font-size="18" font-weight="700" text-anchor="middle">Domain policy</text><text x="714" y="220" fill="#684f2d" font-size="14" text-anchor="middle">rules · rubric · permissions</text><text x="714" y="246" fill="#684f2d" font-size="14" text-anchor="middle">risk · compliance</text><rect x="874" y="150" width="242" height="122" rx="8" fill="#edf8f2" stroke="#56a37a" stroke-width="2"/><text x="995" y="188" fill="#235e43" font-size="18" font-weight="700" text-anchor="middle">Human escalation</text><text x="995" y="220" fill="#3f715b" font-size="14" text-anchor="middle">request · exception · failure</text><text x="995" y="246" fill="#3f715b" font-size="14" text-anchor="middle">structured handoff</text><path d="M284 211H334M554 211H604M824 211H874" stroke="#8794a5" stroke-width="4"/></g><g><rect x="130" y="340" width="276" height="120" rx="8" fill="#172033"/><text x="268" y="379" fill="#ffffff" font-size="19" font-weight="700" text-anchor="middle">Planner and transactional tools</text><text x="268" y="412" fill="#d7dee8" font-size="14" text-anchor="middle">read · speculate · commit</text><text x="268" y="438" fill="#d7dee8" font-size="14" text-anchor="middle">cancel · rollback</text><rect x="452" y="340" width="276" height="120" rx="8" fill="#27364d"/><text x="590" y="379" fill="#ffffff" font-size="19" font-weight="700" text-anchor="middle">Evidence and evaluator</text><text x="590" y="412" fill="#d7dee8" font-size="14" text-anchor="middle">quotes · tool results · policy</text><text x="590" y="438" fill="#d7dee8" font-size="14" text-anchor="middle">outcome verification</text><rect x="774" y="340" width="276" height="120" rx="8" fill="#3d4c62"/><text x="912" y="379" fill="#ffffff" font-size="19" font-weight="700" text-anchor="middle">Audit and monitoring</text><text x="912" y="412" fill="#d7dee8" font-size="14" text-anchor="middle">version · latency · actions</text><text x="912" y="438" fill="#d7dee8" font-size="14" text-anchor="middle">appeal · subgroup drift</text></g><path d="M444 272V310H268V340M714 272V310H590V340M995 272V310H912V340" fill="none" stroke="#8794a5" stroke-width="4"/><rect x="64" y="520" width="1052" height="58" rx="8" fill="#ffffff" stroke="#c5ced9" stroke-width="2"/><text x="590" y="556" fill="#27364d" font-size="16" font-weight="700" text-anchor="middle">Critical invariant: no irreversible action is committed from an unconfirmed realtime hypothesis.</text></g></svg>
