<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1180 620" role="img" aria-labelledby="title desc"><title id="title">Risk-latency frontier</title><desc id="desc">Different actions have different earliest legal execution points based on confidence, reversibility, and consequence.</desc><rect width="1180" height="620" fill="#f7f8fa"/><g font-family="Arial,sans-serif"><text x="64" y="60" fill="#172033" font-size="30" font-weight="700">Act at the earliest legal time, not the earliest possible time</text><text x="64" y="94" fill="#667085" font-size="16">Confidence, reversibility, and consequence define the action boundary</text><line x1="122" y1="490" x2="1090" y2="490" stroke="#8794a5" stroke-width="3"/><line x1="122" y1="490" x2="122" y2="146" stroke="#8794a5" stroke-width="3"/><text x="915" y="530" fill="#667085" font-size="14">more evidence over time →</text><text x="54" y="249" fill="#667085" font-size="14" transform="rotate(-90 54 249)">action confidence →</text><path d="M122 458C310 445 390 395 502 330C642 248 774 194 1090 174" fill="none" stroke="#4386c8" stroke-width="5"/><path d="M122 480C390 474 530 452 674 398C835 337 947 283 1090 263" fill="none" stroke="#d87968" stroke-width="5"/><text x="840" y="187" fill="#174f83" font-size="15" font-weight="700">safe read / retrieval threshold</text><text x="817" y="295" fill="#8b3f34" font-size="15" font-weight="700">side-effect commit threshold</text><line x1="442" y1="146" x2="442" y2="490" stroke="#56a37a" stroke-width="3" stroke-dasharray="9 7"/><text x="442" y="130" fill="#235e43" font-size="14" font-weight="700" text-anchor="middle">t_ready for search</text><line x1="840" y1="146" x2="840" y2="490" stroke="#e3a03f" stroke-width="3" stroke-dasharray="9 7"/><text x="840" y="130" fill="#7a4810" font-size="14" font-weight="700" text-anchor="middle">confirmation / commit</text><g><rect x="238" y="372" width="184" height="56" rx="8" fill="#eaf4ff"/><text x="330" y="406" fill="#174f83" font-size="14" text-anchor="middle">maintain hypotheses</text><rect x="468" y="250" width="184" height="56" rx="8" fill="#edf8f2"/><text x="560" y="284" fill="#235e43" font-size="14" text-anchor="middle">speculative read</text><rect x="674" y="356" width="150" height="56" rx="8" fill="#fff7e8"/><text x="749" y="390" fill="#7a4810" font-size="14" text-anchor="middle">prepare</text><rect x="866" y="228" width="150" height="56" rx="8" fill="#f8ecdf"/><text x="941" y="262" fill="#8b3f34" font-size="14" text-anchor="middle">commit</text></g><rect x="64" y="558" width="1052" height="38" rx="8" fill="#172033"/><text x="590" y="583" fill="#ffffff" font-size="15" text-anchor="middle">Low latency is valuable only when the expected cost of a wrong action remains controlled.</text></g></svg>
