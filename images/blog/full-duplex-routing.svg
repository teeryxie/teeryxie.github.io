<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1180 620" role="img" aria-labelledby="title desc"><title id="title">Full-duplex user stream routing</title><desc id="desc">Channel fusion improves semantic grounding while cross-attention protects ongoing generation from interruption contamination.</desc><rect width="1180" height="620" fill="#f6f8fb"/><g font-family="Arial,sans-serif"><text x="64" y="60" fill="#172033" font-size="30" font-weight="700">Where should the user stream go?</text><text x="64" y="94" fill="#667085" font-size="16">Routing is a trade-off between semantic grounding and context protection</text><rect x="64" y="150" width="482" height="360" rx="8" fill="#eaf4ff" stroke="#4386c8" stroke-width="2"/><text x="305" y="196" fill="#174f83" font-size="24" font-weight="700" text-anchor="middle">Channel fusion</text><text x="305" y="229" fill="#315b80" font-size="15" text-anchor="middle">user stream enters the main LLM sequence</text><rect x="112" y="270" width="174" height="58" rx="7" fill="#ffffff"/><text x="199" y="305" fill="#315b80" font-size="16" text-anchor="middle">User audio</text><path d="M286 299H348" stroke="#64748b" stroke-width="3"/><rect x="348" y="270" width="150" height="58" rx="7" fill="#4386c8"/><text x="423" y="305" fill="#ffffff" font-size="16" text-anchor="middle">LLM context</text><text x="305" y="378" fill="#174f83" font-size="17" font-weight="700" text-anchor="middle">+ stronger grounding</text><text x="305" y="410" fill="#315b80" font-size="15" text-anchor="middle">better spoken QA</text><text x="305" y="444" fill="#8b3f34" font-size="16" font-weight="700" text-anchor="middle">− overlap can corrupt continuation</text><rect x="634" y="150" width="482" height="360" rx="8" fill="#edf8f2" stroke="#56a37a" stroke-width="2"/><text x="875" y="196" fill="#235e43" font-size="24" font-weight="700" text-anchor="middle">Cross-attention routing</text><text x="875" y="229" fill="#3f715b" font-size="15" text-anchor="middle">user stream remains external memory</text><rect x="682" y="270" width="174" height="58" rx="7" fill="#ffffff"/><text x="769" y="305" fill="#3f715b" font-size="16" text-anchor="middle">User memory</text><path d="M856 299H918" stroke="#64748b" stroke-width="3"/><rect x="918" y="270" width="150" height="58" rx="7" fill="#56a37a"/><text x="993" y="305" fill="#ffffff" font-size="16" text-anchor="middle">Cross-attn</text><text x="875" y="378" fill="#235e43" font-size="17" font-weight="700" text-anchor="middle">+ protects generation context</text><text x="875" y="410" fill="#3f715b" font-size="15" text-anchor="middle">missed interrupts stay coherent</text><text x="875" y="444" fill="#8b3f34" font-size="16" font-weight="700" text-anchor="middle">− weaker spoken QA grounding</text><rect x="64" y="554" width="1052" height="42" rx="8" fill="#172033"/><text x="590" y="581" fill="#ffffff" font-size="15" text-anchor="middle">Future direction: dynamic routing based on overlap, uncertainty, task risk, and current generation state.</text></g></svg>
