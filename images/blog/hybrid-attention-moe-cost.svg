<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1180 560" role="img" aria-labelledby="title desc">
  <title id="title">Hybrid attention cost intuition</title>
  <desc id="desc">A comparison of dense attention, efficient attention, and hybrid attention across long contexts.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f9fbff"/>
      <stop offset="1" stop-color="#f4f8fb"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="10" stdDeviation="10" flood-color="#1f252d" flood-opacity=".10"/>
    </filter>
  </defs>
  <rect width="1180" height="560" fill="url(#bg)"/>
  <text x="60" y="60" font-family="Inter, Arial, sans-serif" font-size="30" font-weight="800" fill="#172033">Why Hybrid Attention Exists</text>
  <text x="60" y="94" font-family="Inter, Arial, sans-serif" font-size="16" fill="#5d6876">Omni inputs turn context into a long stream. Full attention is powerful but expensive; purely local or linear mixing is efficient but may miss rare global dependencies.</text>
  <g filter="url(#shadow)">
    <rect x="70" y="150" width="310" height="310" rx="14" fill="#fff" stroke="#dce4ee"/>
    <text x="106" y="194" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="800" fill="#172033">Dense Attention</text>
    <text x="106" y="224" font-family="Inter, Arial, sans-serif" font-size="14" fill="#5d6876">every token can attend to every token</text>
    <g transform="translate(116 258)">
      <rect width="146" height="146" fill="#f8fbff" stroke="#dce4ee"/>
      <g stroke="#4c7fb3" stroke-width="1.4" opacity=".62">
        <line x1="0" y1="0" x2="146" y2="146"/><line x1="0" y1="18" x2="128" y2="146"/><line x1="18" y1="0" x2="146" y2="128"/>
        <line x1="0" y1="36" x2="110" y2="146"/><line x1="36" y1="0" x2="146" y2="110"/><line x1="0" y1="54" x2="92" y2="146"/><line x1="54" y1="0" x2="146" y2="92"/>
      </g>
    </g>
    <text x="106" y="430" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="800" fill="#9a332c">high memory / KV pressure</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="435" y="150" width="310" height="310" rx="14" fill="#fff" stroke="#dce4ee"/>
    <text x="471" y="194" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="800" fill="#172033">Efficient Mixing</text>
    <text x="471" y="224" font-family="Inter, Arial, sans-serif" font-size="14" fill="#5d6876">linear, recurrent, sliding or gated state update</text>
    <g transform="translate(484 276)" fill="none" stroke="#1f8a70" stroke-width="5" stroke-linecap="round">
      <path d="M0 80 C38 30 74 132 112 80 S186 30 224 80"/>
      <path d="M0 124 C38 74 74 176 112 124 S186 74 224 124" opacity=".45"/>
    </g>
    <text x="471" y="430" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="800" fill="#21664e">cheap long stream processing</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="800" y="150" width="310" height="310" rx="14" fill="#fff" stroke="#dce4ee"/>
    <text x="836" y="194" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="800" fill="#172033">Hybrid Attention</text>
    <text x="836" y="224" font-family="Inter, Arial, sans-serif" font-size="14" fill="#5d6876">mix efficient layers with periodic global layers</text>
    <g transform="translate(846 262)">
      <rect x="0" y="0" width="54" height="138" rx="8" fill="#ecf4ff" stroke="#c8d9ee"/>
      <rect x="70" y="0" width="54" height="138" rx="8" fill="#f0fbf7" stroke="#bdddcf"/>
      <rect x="140" y="0" width="54" height="138" rx="8" fill="#f0fbf7" stroke="#bdddcf"/>
      <rect x="210" y="0" width="54" height="138" rx="8" fill="#ecf4ff" stroke="#c8d9ee"/>
      <text x="14" y="78" font-family="Inter, Arial, sans-serif" font-size="13" font-weight="800" fill="#215fa8">G</text>
      <text x="85" y="78" font-family="Inter, Arial, sans-serif" font-size="13" font-weight="800" fill="#21664e">E</text>
      <text x="155" y="78" font-family="Inter, Arial, sans-serif" font-size="13" font-weight="800" fill="#21664e">E</text>
      <text x="224" y="78" font-family="Inter, Arial, sans-serif" font-size="13" font-weight="800" fill="#215fa8">G</text>
    </g>
    <text x="836" y="430" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="800" fill="#215fa8">keeps global anchors without full cost</text>
  </g>
</svg>
