<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1180 620" role="img" aria-labelledby="title desc"><title id="title">Real-time theory of mind loop</title><desc id="desc">A continuous loop from multimodal observation through belief update and policy to action and feedback.</desc><rect width="1180" height="620" fill="#f6f8fb"/><g font-family="Arial,sans-serif"><text x="64" y="60" fill="#172033" font-size="30" font-weight="700">Real-time ToM is a closed loop</text><text x="64" y="94" fill="#667085" font-size="16">The agent acts before the episode is complete, then observes how its action changes the user</text><g><rect x="64" y="190" width="200" height="138" rx="8" fill="#eaf4ff" stroke="#4386c8" stroke-width="2"/><text x="164" y="228" fill="#174f83" font-size="19" font-weight="700" text-anchor="middle">Observe</text><text x="164" y="263" fill="#315b80" font-size="14" text-anchor="middle">speech · gaze · gesture</text><text x="164" y="289" fill="#315b80" font-size="14" text-anchor="middle">scene · tools · timing</text><path d="M264 259H332" stroke="#8291a5" stroke-width="4"/><path d="M320 248l14 11-14 11" fill="none" stroke="#8291a5" stroke-width="4"/><rect x="334" y="190" width="220" height="138" rx="8" fill="#f3eef9" stroke="#9672b4" stroke-width="2"/><text x="444" y="228" fill="#654580" font-size="19" font-weight="700" text-anchor="middle">Update beliefs</text><text x="444" y="263" fill="#6f5a80" font-size="14" text-anchor="middle">knowledge · goal</text><text x="444" y="289" fill="#6f5a80" font-size="14" text-anchor="middle">attention · uncertainty</text><path d="M554 259H622" stroke="#8291a5" stroke-width="4"/><path d="M610 248l14 11-14 11" fill="none" stroke="#8291a5" stroke-width="4"/><rect x="624" y="190" width="220" height="138" rx="8" fill="#fff7e8" stroke="#e3a03f" stroke-width="2"/><text x="734" y="228" fill="#7a4810" font-size="19" font-weight="700" text-anchor="middle">Choose policy</text><text x="734" y="263" fill="#684f2d" font-size="14" text-anchor="middle">wait · ask · answer</text><text x="734" y="289" fill="#684f2d" font-size="14" text-anchor="middle">stop · tool · escalate</text><path d="M844 259H912" stroke="#8291a5" stroke-width="4"/><path d="M900 248l14 11-14 11" fill="none" stroke="#8291a5" stroke-width="4"/><rect x="914" y="190" width="202" height="138" rx="8" fill="#edf8f2" stroke="#56a37a" stroke-width="2"/><text x="1015" y="228" fill="#235e43" font-size="19" font-weight="700" text-anchor="middle">Act</text><text x="1015" y="263" fill="#3f715b" font-size="14" text-anchor="middle">speech · UI · tool</text><text x="1015" y="289" fill="#3f715b" font-size="14" text-anchor="middle">change user belief</text><path d="M1015 328V426H164V330" fill="none" stroke="#56a37a" stroke-width="4"/><path d="M153 344l11-14 11 14" fill="none" stroke="#56a37a" stroke-width="4"/></g><rect x="64" y="468" width="1052" height="82" rx="8" fill="#172033"/><text x="590" y="502" fill="#ffffff" font-size="17" font-weight="700" text-anchor="middle">Key constraint: every estimate is provisional</text><text x="590" y="530" fill="#d7dee8" font-size="14" text-anchor="middle">New evidence can revise the belief state; risky actions require confirmation rather than confident mind-reading.</text></g></svg>
