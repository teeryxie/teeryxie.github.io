<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1180 620" role="img" aria-labelledby="title desc"><title id="title">Six-stage training plan</title><desc id="desc">A staged route from a strong speech model to an interactive agent policy with rollback and online recovery.</desc><rect width="1180" height="620" fill="#f6f8fb"/><g font-family="Arial,sans-serif"><text x="64" y="60" fill="#172033" font-size="30" font-weight="700">Six stages to an agentic omni policy</text><text x="64" y="94" fill="#667085" font-size="16">Add dynamics, action, cognition, timing, and recovery without discarding base intelligence</text><g><rect x="64" y="148" width="326" height="104" rx="8" fill="#eaf4ff" stroke="#4386c8" stroke-width="2"/><text x="90" y="182" fill="#174f83" font-size="18" font-weight="700">1 · Preserve intelligence</text><text x="90" y="214" fill="#315b80" font-size="14">strong base · LoRA · replay data</text><rect x="427" y="148" width="326" height="104" rx="8" fill="#edf8f2" stroke="#56a37a" stroke-width="2"/><text x="453" y="182" fill="#235e43" font-size="18" font-weight="700">2 · Learn duplex dynamics</text><text x="453" y="214" fill="#3f715b" font-size="14">listen · overlap · silence · yield</text><rect x="790" y="148" width="326" height="104" rx="8" fill="#fff7e8" stroke="#e3a03f" stroke-width="2"/><text x="816" y="182" fill="#7a4810" font-size="18" font-weight="700">3 · Add action channel</text><text x="816" y="214" fill="#684f2d" font-size="14">schema · timing · dependencies</text><path d="M390 200H427M753 200H790" stroke="#8794a5" stroke-width="4"/><path d="M415 190l12 10-12 10M778 190l12 10-12 10" fill="none" stroke="#8794a5" stroke-width="4"/><rect x="790" y="326" width="326" height="104" rx="8" fill="#f3eef9" stroke="#9672b4" stroke-width="2"/><text x="816" y="360" fill="#654580" font-size="18" font-weight="700">4 · Distill while-listening state</text><text x="816" y="392" fill="#6f5a80" font-size="14">belief · latent plan · t_ready</text><rect x="427" y="326" width="326" height="104" rx="8" fill="#f8ecdf" stroke="#d87968" stroke-width="2"/><text x="453" y="360" fill="#8b3f34" font-size="18" font-weight="700">5 · Optimize critical windows</text><text x="453" y="392" fill="#765854" font-size="14">DPO / GRPO · timing rewards</text><rect x="64" y="326" width="326" height="104" rx="8" fill="#ffffff" stroke="#9aa6b5" stroke-width="2"/><text x="90" y="360" fill="#27364d" font-size="18" font-weight="700">6 · Roll out and aggregate</text><text x="90" y="392" fill="#526176" font-size="14">simulation · DAgger · recovery</text><path d="M953 252V326M790 378H753M427 378H390" stroke="#8794a5" stroke-width="4"/><path d="M943 314l10 12 10-12M765 368l-12 10 12 10M402 368l-12 10 12 10" fill="none" stroke="#8794a5" stroke-width="4"/></g><rect x="64" y="500" width="1052" height="68" rx="8" fill="#172033"/><text x="590" y="529" fill="#ffffff" font-size="16" font-weight="700" text-anchor="middle">Evaluate after every stage</text><text x="590" y="553" fill="#d7dee8" font-size="14" text-anchor="middle">reasoning · speech quality · dynamics · action timing · rollback · safety</text></g></svg>
