<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1180 620" role="img" aria-labelledby="title desc"><title id="title">Full-duplex overlap policy</title><desc id="desc">Four overlap scenarios require different stop and response latency policies.</desc><rect width="1180" height="620" fill="#f7f8fa"/><g font-family="Arial,sans-serif"><text x="64" y="60" fill="#172033" font-size="30" font-weight="700">Overlap is not one event</text><text x="64" y="94" fill="#667085" font-size="16">The same acoustic overlap can mean yield, hold, resume, or ignore</text><g fill="#667085" font-size="13" text-anchor="middle"><text x="340" y="142">stop latency</text><text x="790" y="142">response latency</text></g><g stroke="#d2d9e2" stroke-width="2"><line x1="132" y1="160" x2="548" y2="160"/><line x1="582" y1="160" x2="998" y2="160"/></g><g font-size="14"><text x="64" y="212" fill="#8b3f34" font-weight="700">Interruption</text><text x="64" y="233" fill="#765854">new floor claim</text><text x="64" y="310" fill="#7a4810" font-weight="700">Backchannel</text><text x="64" y="331" fill="#7e6545">listener feedback</text><text x="64" y="408" fill="#654580" font-weight="700">Talking to others</text><text x="64" y="429" fill="#83718f">not addressed to agent</text><text x="64" y="506" fill="#235e43" font-weight="700">Background speech</text><text x="64" y="527" fill="#587363">ambient voice</text></g><g><rect x="132" y="188" width="416" height="50" rx="8" fill="#f7d7d1"/><rect x="132" y="188" width="120" height="50" rx="8" fill="#d87968"/><text x="340" y="219" fill="#8b3f34" font-size="15" text-anchor="middle">LOW · yield quickly</text><rect x="582" y="188" width="416" height="50" rx="8" fill="#f7d7d1"/><rect x="582" y="188" width="120" height="50" rx="8" fill="#d87968"/><text x="790" y="219" fill="#8b3f34" font-size="15" text-anchor="middle">LOW · answer new intent</text><rect x="132" y="286" width="416" height="50" rx="8" fill="#f5e3c6"/><rect x="132" y="286" width="360" height="50" rx="8" fill="#e3a03f"/><text x="340" y="317" fill="#7a4810" font-size="15" text-anchor="middle">HIGH · keep floor</text><rect x="582" y="286" width="416" height="50" rx="8" fill="#f5e3c6"/><rect x="582" y="286" width="120" height="50" rx="8" fill="#e3a03f"/><text x="790" y="317" fill="#7a4810" font-size="15" text-anchor="middle">LOW · resume</text><rect x="132" y="384" width="416" height="50" rx="8" fill="#e7dff0"/><rect x="132" y="384" width="360" height="50" rx="8" fill="#9672b4"/><text x="340" y="415" fill="#654580" font-size="15" text-anchor="middle">HIGH · ignore overlap</text><rect x="582" y="384" width="416" height="50" rx="8" fill="#e7dff0"/><rect x="582" y="384" width="120" height="50" rx="8" fill="#9672b4"/><text x="790" y="415" fill="#654580" font-size="15" text-anchor="middle">LOW · continue</text><rect x="132" y="482" width="416" height="50" rx="8" fill="#d9eee3"/><rect x="132" y="482" width="360" height="50" rx="8" fill="#56a37a"/><text x="340" y="513" fill="#235e43" font-size="15" text-anchor="middle">HIGH · filter noise</text><rect x="582" y="482" width="416" height="50" rx="8" fill="#d9eee3"/><rect x="582" y="482" width="120" height="50" rx="8" fill="#56a37a"/><text x="790" y="513" fill="#235e43" font-size="15" text-anchor="middle">LOW · keep going</text></g><rect x="64" y="558" width="1052" height="38" rx="8" fill="#172033"/><text x="590" y="583" fill="#ffffff" font-size="15" text-anchor="middle">Optimal behavior is conditional: the goal is not minimum stop latency, but correct floor control.</text></g></svg>
