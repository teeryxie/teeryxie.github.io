<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1180 560" role="img" aria-labelledby="title desc">
  <title id="title">Async reward timeline in VeRL-Omni</title>
  <desc id="desc">A timeline comparing synchronous reward computation and asynchronous reward streaming.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fbfcff"/>
      <stop offset="1" stop-color="#f8f4ff"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="10" stdDeviation="10" flood-color="#1f252d" flood-opacity=".10"/>
    </filter>
  </defs>
  <rect width="1180" height="560" fill="url(#bg)"/>
  <text x="60" y="60" font-family="Inter, Arial, sans-serif" font-size="30" font-weight="800" fill="#172033">Async Reward Hides Reward Latency Behind Rollout</text>
  <text x="60" y="94" font-family="Inter, Arial, sans-serif" font-size="16" fill="#5d6876">Completed samples are sent to reward workers immediately, while rollout workers keep generating the rest of the batch.</text>
  <g filter="url(#shadow)">
    <rect x="80" y="145" width="1020" height="145" rx="14" fill="#fff" stroke="#dce4ee"/>
    <text x="110" y="190" font-family="Inter, Arial, sans-serif" font-size="21" font-weight="800" fill="#172033">Synchronous reward</text>
    <rect x="330" y="174" width="410" height="42" rx="8" fill="#ecf4ff" stroke="#c8d9ee"/>
    <text x="486" y="201" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="800" fill="#215fa8">rollout full batch</text>
    <rect x="750" y="174" width="200" height="42" rx="8" fill="#fff1ed" stroke="#f2c7bd"/>
    <text x="802" y="201" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="800" fill="#9a332c">score batch</text>
    <rect x="960" y="174" width="92" height="42" rx="8" fill="#edf8f2" stroke="#bdddcf"/>
    <text x="984" y="201" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="800" fill="#21664e">train</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="80" y="330" width="1020" height="145" rx="14" fill="#fff" stroke="#dce4ee"/>
    <text x="110" y="375" font-family="Inter, Arial, sans-serif" font-size="21" font-weight="800" fill="#172033">Asynchronous reward</text>
    <rect x="330" y="360" width="410" height="42" rx="8" fill="#ecf4ff" stroke="#c8d9ee"/>
    <text x="486" y="387" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="800" fill="#215fa8">rollout streaming samples</text>
    <rect x="480" y="418" width="140" height="30" rx="8" fill="#fff1ed" stroke="#f2c7bd"/>
    <text x="510" y="438" font-family="Inter, Arial, sans-serif" font-size="12" font-weight="800" fill="#9a332c">score early</text>
    <rect x="630" y="418" width="140" height="30" rx="8" fill="#fff1ed" stroke="#f2c7bd"/>
    <text x="660" y="438" font-family="Inter, Arial, sans-serif" font-size="12" font-weight="800" fill="#9a332c">score mid</text>
    <rect x="780" y="418" width="140" height="30" rx="8" fill="#fff1ed" stroke="#f2c7bd"/>
    <text x="808" y="438" font-family="Inter, Arial, sans-serif" font-size="12" font-weight="800" fill="#9a332c">score late</text>
    <rect x="960" y="360" width="92" height="42" rx="8" fill="#edf8f2" stroke="#bdddcf"/>
    <text x="984" y="387" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="800" fill="#21664e">train</text>
  </g>
</svg>
