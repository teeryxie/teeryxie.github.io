<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1180 620" role="img" aria-labelledby="title desc">
  <title id="title">Agentic realtime omni loop</title><desc id="desc">Continuous multimodal perception feeds state, timing policy, planning, tools, speech, and environmental feedback.</desc>
  <rect width="1180" height="620" fill="#f7f8fa"/><g font-family="Arial, sans-serif">
  <text x="64" y="60" fill="#172033" font-size="30" font-weight="700">Realtime omni is a continuous agent loop</text><text x="64" y="94" fill="#667085" font-size="16">Natural speech is the actuator; state, timing, planning, tools, and feedback are the intelligence</text>
  <g>
    <rect x="64" y="190" width="194" height="220" rx="8" fill="#eaf4ff" stroke="#4386c8" stroke-width="2"/><text x="161" y="232" fill="#174f83" font-size="21" font-weight="700" text-anchor="middle">Perceive</text><text x="161" y="270" fill="#315b80" font-size="15" text-anchor="middle">audio · video · text</text><text x="161" y="298" fill="#315b80" font-size="15" text-anchor="middle">speaker · emotion</text><text x="161" y="326" fill="#315b80" font-size="15" text-anchor="middle">events · tool results</text><text x="161" y="374" fill="#5c7188" font-size="13" text-anchor="middle">continuous prefixes</text>
    <rect x="306" y="142" width="220" height="316" rx="8" fill="#fff7e8" stroke="#e3a03f" stroke-width="2"/><text x="416" y="186" fill="#7a4810" font-size="21" font-weight="700" text-anchor="middle">World state</text><text x="416" y="227" fill="#684f2d" font-size="15" text-anchor="middle">conversation phase</text><text x="416" y="257" fill="#684f2d" font-size="15" text-anchor="middle">user intent / uncertainty</text><text x="416" y="287" fill="#684f2d" font-size="15" text-anchor="middle">visual events</text><text x="416" y="317" fill="#684f2d" font-size="15" text-anchor="middle">pending tools</text><text x="416" y="347" fill="#684f2d" font-size="15" text-anchor="middle">working + long memory</text><rect x="346" y="382" width="140" height="42" rx="6" fill="#e3a03f"/><text x="416" y="409" fill="#ffffff" font-size="15" text-anchor="middle">update every chunk</text>
    <rect x="574" y="142" width="226" height="316" rx="8" fill="#f3eef9" stroke="#9672b4" stroke-width="2"/><text x="687" y="186" fill="#654580" font-size="21" font-weight="700" text-anchor="middle">Policy</text><text x="687" y="227" fill="#6f5a80" font-size="15" text-anchor="middle">listen · wait · speak</text><text x="687" y="257" fill="#6f5a80" font-size="15" text-anchor="middle">backchannel · interrupt</text><text x="687" y="287" fill="#6f5a80" font-size="15" text-anchor="middle">ask · plan · revise</text><text x="687" y="317" fill="#6f5a80" font-size="15" text-anchor="middle">call / cancel tool</text><text x="687" y="347" fill="#6f5a80" font-size="15" text-anchor="middle">safety gate</text><rect x="617" y="382" width="140" height="42" rx="6" fill="#9672b4"/><text x="687" y="409" fill="#ffffff" font-size="15" text-anchor="middle">timing is an action</text>
    <rect x="848" y="190" width="268" height="220" rx="8" fill="#edf8f2" stroke="#56a37a" stroke-width="2"/><text x="982" y="232" fill="#235e43" font-size="21" font-weight="700" text-anchor="middle">Act</text><text x="982" y="270" fill="#3f715b" font-size="15" text-anchor="middle">stream speech / gesture</text><text x="982" y="298" fill="#3f715b" font-size="15" text-anchor="middle">search · function call</text><text x="982" y="326" fill="#3f715b" font-size="15" text-anchor="middle">control device</text><text x="982" y="374" fill="#587363" font-size="13" text-anchor="middle">observable consequences</text>
  </g>
  <g stroke="#64748b" stroke-width="3" fill="none"><path d="M258 300H306"/><path d="M526 300H574"/><path d="M800 300H848"/><path d="M982 410V506H161V410"/><path d="M250 493l-14 13 14 13"/></g>
  <text x="590" y="535" fill="#5d6978" font-size="15" text-anchor="middle">environment and user feedback change the next observation</text>
  <rect x="64" y="564" width="1052" height="36" rx="8" fill="#172033"/><text x="590" y="588" fill="#ffffff" font-size="15" text-anchor="middle">Interruption is one policy transition; reliable participation is the full objective.</text>
  </g></svg>
