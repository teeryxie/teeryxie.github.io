<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1180 620" role="img" aria-labelledby="title desc"><title id="title">Full-duplex research evolution after GPT-4o</title><desc id="desc">The evolution from synchronized audio streams to explicit interaction policies.</desc><rect width="1180" height="620" fill="#f6f8fb"/><g font-family="Arial,sans-serif"><text x="64" y="60" fill="#172033" font-size="30" font-weight="700">Full-duplex after GPT-4o</text><text x="64" y="94" fill="#667085" font-size="16">The research object moved from audio generation to conversational policy</text><line x1="104" y1="326" x2="1082" y2="326" stroke="#8794a5" stroke-width="4"/><g><circle cx="140" cy="326" r="12" fill="#4386c8"/><rect x="64" y="150" width="180" height="126" rx="8" fill="#eaf4ff" stroke="#4386c8" stroke-width="2"/><text x="154" y="185" fill="#174f83" font-size="18" font-weight="700" text-anchor="middle">2024 Q2</text><text x="154" y="218" fill="#315b80" font-size="15" text-anchor="middle">GPT-4o</text><text x="154" y="245" fill="#315b80" font-size="15" text-anchor="middle">product target</text><text x="154" y="267" fill="#5c7188" font-size="13" text-anchor="middle">fast voice + vision</text><circle cx="366" cy="326" r="12" fill="#9672b4"/><rect x="274" y="382" width="184" height="138" rx="8" fill="#f3eef9" stroke="#9672b4" stroke-width="2"/><text x="366" y="416" fill="#654580" font-size="18" font-weight="700" text-anchor="middle">2024 H2</text><text x="366" y="448" fill="#6f5a80" font-size="15" text-anchor="middle">Moshi · SyncLLM</text><text x="366" y="474" fill="#6f5a80" font-size="14" text-anchor="middle">parallel streams</text><text x="366" y="498" fill="#83718f" font-size="13" text-anchor="middle">clock + overlap</text><circle cx="596" cy="326" r="12" fill="#e3a03f"/><rect x="500" y="150" width="194" height="126" rx="8" fill="#fff7e8" stroke="#e3a03f" stroke-width="2"/><text x="597" y="185" fill="#7a4810" font-size="18" font-weight="700" text-anchor="middle">2025</text><text x="597" y="218" fill="#684f2d" font-size="15" text-anchor="middle">SALM · Full-Duplex-Bench</text><text x="597" y="245" fill="#684f2d" font-size="14" text-anchor="middle">overlap scenarios</text><text x="597" y="267" fill="#7e6545" font-size="13" text-anchor="middle">measure stop / response</text><circle cx="824" cy="326" r="12" fill="#56a37a"/><rect x="722" y="382" width="204" height="138" rx="8" fill="#edf8f2" stroke="#56a37a" stroke-width="2"/><text x="824" y="416" fill="#235e43" font-size="18" font-weight="700" text-anchor="middle">2026</text><text x="824" y="448" fill="#3f715b" font-size="15" text-anchor="middle">FLAIR · S-MARC</text><text x="824" y="474" fill="#3f715b" font-size="14" text-anchor="middle">stream state + latent thought</text><text x="824" y="498" fill="#587363" font-size="13" text-anchor="middle">routing + policy</text><circle cx="1050" cy="326" r="12" fill="#235e43"/><rect x="942" y="150" width="194" height="126" rx="8" fill="#e5f4eb" stroke="#235e43" stroke-width="2"/><text x="1039" y="185" fill="#235e43" font-size="18" font-weight="700" text-anchor="middle">2026 H2</text><text x="1039" y="218" fill="#3f715b" font-size="15" text-anchor="middle">DuplexPO · TurnNat</text><text x="1039" y="245" fill="#3f715b" font-size="14" text-anchor="middle">RL timing policy</text><text x="1039" y="267" fill="#587363" font-size="13" text-anchor="middle">naturalness + control</text></g><rect x="64" y="558" width="1052" height="38" rx="8" fill="#172033"/><text x="590" y="583" fill="#ffffff" font-size="15" text-anchor="middle">I/O stream → wall-clock synchrony → overlap evaluation → state estimation → latent reasoning → interaction policy</text></g></svg>
