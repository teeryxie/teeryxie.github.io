<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1180 620" role="img" aria-labelledby="title desc"><title id="title">Causal trajectory distillation</title><desc id="desc">An offline posterior teacher sees the complete episode while a causal streaming student learns prefix-aligned belief, control, and action targets.</desc><rect width="1180" height="620" fill="#f7f8fa"/><g font-family="Arial,sans-serif"><text x="64" y="60" fill="#172033" font-size="30" font-weight="700">Distill a slow agent into a causal streaming policy</text><text x="64" y="94" fill="#667085" font-size="16">Future context may construct targets; it must never enter the student's observation</text><g><rect x="64" y="150" width="454" height="308" rx="8" fill="#f3eef9" stroke="#9672b4" stroke-width="2"/><text x="291" y="191" fill="#654580" font-size="21" font-weight="700" text-anchor="middle">Offline posterior teacher</text><text x="291" y="229" fill="#6f5a80" font-size="15" text-anchor="middle">complete transcript + future corrections</text><text x="291" y="260" fill="#6f5a80" font-size="15" text-anchor="middle">final tool outcomes + workflow rules</text><rect x="112" y="302" width="358" height="110" rx="7" fill="#ffffff"/><text x="291" y="334" fill="#27364d" font-size="15" font-weight="700" text-anchor="middle">Generate timestamped posterior targets</text><text x="291" y="366" fill="#526176" font-size="14" text-anchor="middle">belief · earliest legal action · revision</text><text x="291" y="392" fill="#526176" font-size="14" text-anchor="middle">compact plan · latent target · rollback</text><rect x="662" y="150" width="454" height="308" rx="8" fill="#eaf4ff" stroke="#4386c8" stroke-width="2"/><text x="889" y="191" fill="#174f83" font-size="21" font-weight="700" text-anchor="middle">Online causal student</text><text x="889" y="229" fill="#315b80" font-size="15" text-anchor="middle">audio/video prefix only</text><text x="889" y="260" fill="#315b80" font-size="15" text-anchor="middle">events available at time t only</text><rect x="710" y="302" width="358" height="110" rx="7" fill="#ffffff"/><text x="889" y="334" fill="#27364d" font-size="15" font-weight="700" text-anchor="middle">Predict streaming policy state</text><text x="889" y="366" fill="#526176" font-size="14" text-anchor="middle">belief · control · action · speech</text><text x="889" y="392" fill="#526176" font-size="14" text-anchor="middle">revise when new evidence arrives</text></g><path d="M518 304H662" stroke="#e3a03f" stroke-width="5" stroke-dasharray="10 8"/><path d="M646 291l17 13-17 13" fill="none" stroke="#e3a03f" stroke-width="5"/><text x="590" y="283" fill="#7a4810" font-size="14" font-weight="700" text-anchor="middle">trajectory + latent distillation</text><rect x="64" y="510" width="1052" height="70" rx="8" fill="#172033"/><text x="590" y="540" fill="#ffffff" font-size="16" font-weight="700" text-anchor="middle">Training can be expensive, non-causal, and modular.</text><text x="590" y="565" fill="#d7dee8" font-size="14" text-anchor="middle">Inference remains causal, unified, and latency-bounded.</text></g></svg>
