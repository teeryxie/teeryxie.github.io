<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1180 620" role="img" aria-labelledby="title desc"><title id="title">Theory of mind benchmark map</title><desc id="desc">Benchmarks cover increasingly interactive and multimodal settings, but no family covers all real-time agent requirements.</desc><rect width="1180" height="620" fill="#f6f8fb"/><g font-family="Arial,sans-serif"><text x="64" y="60" fill="#172033" font-size="30" font-weight="700">The ToM benchmark landscape</text><text x="64" y="94" fill="#667085" font-size="16">Moving right adds interaction; moving up adds richer, streaming observation</text><line x1="118" y1="514" x2="1088" y2="514" stroke="#8794a5" stroke-width="3"/><line x1="118" y1="514" x2="118" y2="142" stroke="#8794a5" stroke-width="3"/><text x="944" y="554" fill="#667085" font-size="14">action and consequence →</text><text x="54" y="174" fill="#667085" font-size="14" transform="rotate(-90 54 174)">multimodal and online →</text><g><rect x="166" y="398" width="228" height="82" rx="8" fill="#eaf4ff" stroke="#4386c8" stroke-width="2"/><text x="280" y="429" fill="#174f83" font-size="17" font-weight="700" text-anchor="middle">Text belief reasoning</text><text x="280" y="457" fill="#315b80" font-size="13" text-anchor="middle">ToMBench · HI-ToM · MindGames</text><rect x="430" y="306" width="228" height="82" rx="8" fill="#f3eef9" stroke="#9672b4" stroke-width="2"/><text x="544" y="337" fill="#654580" font-size="17" font-weight="700" text-anchor="middle">Multimodal ToM</text><text x="544" y="365" fill="#6f5a80" font-size="13" text-anchor="middle">MMToM-QA · MOMENTS</text><rect x="682" y="382" width="228" height="82" rx="8" fill="#fff7e8" stroke="#e3a03f" stroke-width="2"/><text x="796" y="413" fill="#7a4810" font-size="17" font-weight="700" text-anchor="middle">Interactive agents</text><text x="796" y="441" fill="#684f2d" font-size="13" text-anchor="middle">MindCraft · SOTOPIA-TOM</text><rect x="864" y="188" width="252" height="112" rx="8" fill="#edf8f2" stroke="#56a37a" stroke-width="2"/><text x="990" y="221" fill="#235e43" font-size="17" font-weight="700" text-anchor="middle">Target: real-time HAI</text><text x="990" y="250" fill="#3f715b" font-size="13" text-anchor="middle">streaming AV + belief revision</text><text x="990" y="276" fill="#3f715b" font-size="13" text-anchor="middle">tools + risk + human outcomes</text><path d="M394 414C520 220 690 184 862 236" fill="none" stroke="#9aa6b5" stroke-width="3" stroke-dasharray="10 8"/></g><rect x="64" y="574" width="1052" height="30" rx="8" fill="#172033"/><text x="590" y="595" fill="#ffffff" font-size="14" text-anchor="middle">High static accuracy is necessary; reliable online belief revision and authorized action are the missing tests.</text></g></svg>
