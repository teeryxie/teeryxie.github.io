<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1180 620" role="img" aria-labelledby="title desc"><title id="title">Full-duplex evaluation stack</title><desc id="desc">Content, audio, local timing, behavior, and multi-turn naturalness are evaluated together.</desc><rect width="1180" height="620" fill="#f7f8fa"/><g font-family="Arial,sans-serif"><text x="64" y="60" fill="#172033" font-size="30" font-weight="700">A full-duplex benchmark is a stack</text><text x="64" y="94" fill="#667085" font-size="16">A correct transcript does not prove correct conversational behavior</text><g><rect x="238" y="150" width="704" height="60" rx="8" fill="#edf8f2" stroke="#56a37a" stroke-width="2"/><text x="590" y="187" fill="#235e43" font-size="19" font-weight="700" text-anchor="middle">5 · Multi-turn naturalness: TurnNat, human preference, state consistency</text><rect x="238" y="230" width="704" height="60" rx="8" fill="#e7dff0" stroke="#9672b4" stroke-width="2"/><text x="590" y="267" fill="#654580" font-size="19" font-weight="700" text-anchor="middle">4 · Behavior: respond / resume / hold / ignore</text><rect x="238" y="310" width="704" height="60" rx="8" fill="#fff7e8" stroke="#e3a03f" stroke-width="2"/><text x="590" y="347" fill="#7a4810" font-size="19" font-weight="700" text-anchor="middle">3 · Local timing: stop / response latency, pause, FTO</text><rect x="238" y="390" width="704" height="60" rx="8" fill="#eaf4ff" stroke="#4386c8" stroke-width="2"/><text x="590" y="427" fill="#174f83" font-size="19" font-weight="700" text-anchor="middle">2 · Audio: WER, UTMOS, speaker similarity, prosody</text><rect x="238" y="470" width="704" height="60" rx="8" fill="#ffffff" stroke="#9aa6b5" stroke-width="2"/><text x="590" y="507" fill="#27364d" font-size="19" font-weight="700" text-anchor="middle">1 · Content: spoken QA, instruction following, tools, safety</text></g><rect x="64" y="562" width="1052" height="34" rx="8" fill="#172033"/><text x="590" y="585" fill="#ffffff" font-size="15" text-anchor="middle">The target is not “fast speech”; it is the correct action at the correct time with useful content.</text></g></svg>
